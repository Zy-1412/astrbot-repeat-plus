<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script>{{ vis_js_content | safe }}</script>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #1a1a2e;
            overflow: hidden;
            font-family: "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
        }
        #network-container {
            width: 100%; height: 100vh;
            position: relative;
        }
        .title-bar {
            position: absolute; top: 0; left: 0; right: 0;
            height: 60px;
            display: flex; align-items: center; justify-content: center;
            color: #ffffff; font-size: 28px; font-weight: bold;
            background: linear-gradient(180deg, rgba(26,26,46,0.95), rgba(26,26,46,0));
            z-index: 10; pointer-events: none;
        }
        .stats-bar {
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 44px;
            display: flex; align-items: center; justify-content: center; gap: 30px;
            color: #8888aa; font-size: 14px;
            background: linear-gradient(0deg, rgba(26,26,46,0.95), rgba(26,26,46,0));
            z-index: 10; pointer-events: none;
        }
        .stats-bar span { display: flex; align-items: center; gap: 6px; }
        .stats-bar .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .legend {
            position: absolute; top: 70px; right: 16px;
            background: rgba(13,13,26,0.85); border-radius: 8px;
            padding: 12px 16px; z-index: 10; pointer-events: none;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; color: #ccc; font-size: 13px; }
        .legend-item .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>
    <div class="title-bar">{{ title }}</div>
    <div class="stats-bar">
        <span>共 {{ node_count }} 人 · {{ edge_count }} 条羁绊</span>
        <span><span class="dot" style="background:#5ef7f0"></span>抽取 {{ draw_count }}</span>
        <span><span class="dot" style="background:#ff8787"></span>强娶 {{ force_count }}</span>
    </div>
    <div class="legend">
        <div class="legend-item"><span class="dot" style="background:#3498db"></span>抽取者</div>
        <div class="legend-item"><span class="dot" style="background:#e74c3c"></span>被抽者</div>
        <div class="legend-item"><span class="dot" style="background:#9b59b6"></span>双向</div>
        <div class="legend-item"><span class="dot" style="background:#5ef7f0"></span>抽取边</div>
        <div class="legend-item"><span class="dot" style="background:#ff8787"></span>强娶边</div>
    </div>
    <div id="network-container"></div>
    <script>
        const hourlyTag = new Date().toISOString().slice(0, 13);
        const raw_data = {{ records | tojson }};
        const user_map = {{ user_map | tojson }} || {};
        const node_roles = {{ node_roles | tojson }} || {};
        const nodes = [];
        const edges = [];
        const userSet = new Set();

        raw_data.forEach(r => {
            const userName = user_map[r.user_id] || r.user_name || ("用户" + r.user_id);
            const wifeName = user_map[r.husband_id] || r.husband_name || ("用户" + r.husband_id);
            [{ id: r.user_id, name: userName }, { id: r.husband_id, name: wifeName }].forEach(u => {
                if (!userSet.has(u.id)) {
                    userSet.add(u.id);
                    const role = node_roles[u.id] || "drawn";
                    let borderColor = "#e74c3c";
                    if (role === "drawer") borderColor = "#3498db";
                    else if (role === "both") borderColor = "#9b59b6";
                    nodes.push({
                        id: u.id,
                        label: u.name,
                        shape: 'circularImage',
                        image: `https://q4.qlogo.cn/headimg_dl?dst_uin=${u.id}&spec=640&t=${hourlyTag}`,
                        borderWidth: 5,
                        size: 55,
                        color: { border: borderColor, background: '#ffffff' },
                        font: {
                            color: '#cccccc',
                            size: 22,
                            vadjust: 18,
                            strokeWidth: 4,
                            strokeColor: '#1a1a2e',
                            bold: { color: '#ffffff', size: 22, vadjust: 18 }
                        }
                    });
                }
            });
            const isForce = r.source === "force";
            edges.push({
                from: r.user_id,
                to: r.husband_id,
                label: isForce ? "强娶" : "抽",
                arrows: { to: { enabled: true, scaleFactor: 2, type: 'arrow' } },
                color: { color: isForce ? '#ff8787' : '#5ef7f0', width: 3 },
                font: { align: 'middle', color: '#888899', size: 20, background: '#1a1a2e88' },
                length: 500,
                smooth: { type: 'curvedCW', roundness: 0.2 }
            });
        });

        const container = document.getElementById('network-container');
        const data = { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) };
        const options = {
            nodes: {
                shape: 'circularImage',
                font: { face: 'Microsoft YaHei, Noto Sans CJK SC' }
            },
            edges: {
                smooth: { type: 'curvedCW', roundness: 0.2 }
            },
            physics: {
                enabled: true,
                barnesHut: {
                    gravitationalConstant: -80000,
                    centralGravity: 0.005,
                    springLength: 600,
                    springConstant: 0.045,
                    damping: 0.09,
                    avoidOverlap: 1
                },
                stabilization: {
                    enabled: true,
                    iterations: {{ iterations }},
                    updateInterval: 25,
                    onlyDynamicEdges: false,
                    fit: true
                }
            }
        };
        const network = new vis.Network(container, data, options);
        network.once("stabilizationIterationsDone", function () {
            network.fit();
        });
    </script>
</body>
</html>
